spring.application.name=notification-service

# ======================
# H2 DATABASE CONFIG
# ======================
spring.datasource.url=jdbc:h2:mem:notification_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# (Hibernate auto-detects dialect now ? remove explicit one)
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ======================
# H2 CONSOLE
# ======================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ======================
# JPA Warning Fix
# ======================
spring.jpa.open-in-view=false

# ======================
# MAIL CONFIG
# ======================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=27f436139a02e9
spring.mail.password=1c0252c93b7d3d
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Allows other devices on the Wi-Fi to connect
server.address=0.0.0.0
server.port=8080

# Keep your existing file upload path
file.upload-dir=uploads/leaves
